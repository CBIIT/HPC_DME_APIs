<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="HPC Data Management" />
<meta name="author" content="SVG, Inc" />
<link rel="shortcut icon" th:href="@{/img/favicon.png}" />
<title>NCI Data Management Environment</title>
<link th:href="@{/css/bootstrap.min.css}" rel="stylesheet" />
<link th:href="@{/css/bootstrap-theme.css}" rel="stylesheet" />
<link th:href="@{/css/elegant-icons-style.css}" rel="stylesheet" />
<link th:href="@{/css/font-awesome.min.css}" rel="stylesheet" />
<link th:href="@{/css/style.css}" rel="stylesheet" />
<link th:href="@{/css/style-responsive.css}" rel="stylesheet" />
</head>
<body>
	<section id="container" class="">
		<div th:insert="~{header :: header}"></div>
		<section id="main-content">
			<section class="wrapper">
				<div class="row">
					<div class="col-lg-12">
						<h4>
							<i class="fa fa-dashboard"></i> Manage DOC - Model
						</h4>
					</div>
				</div>
				<div class="row">
					<div class="col-lg-12">
						<div class="panel panel-default">
							<div class="panel-heading">
								<h2>
									<span th:text="${docModel != null ? docModel.basePath : ''}"></span>
								</h2>
							</div>
							<div class="panel-body">
								<div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>
								<div class="alert alert-success" th:if="${success != null}" th:text="${success}"></div>
								<form class="form-horizontal" th:action="@{/doc/model}" method="POST" th:object="${docModel}">
									<input type="hidden" th:field="*{basePath}" />
									<input type="hidden" th:field="*{doc}" />

									<div class="form-group">
										<label class="control-label col-lg-3">Data Hierarchy</label>
										<div class="col-lg-9">
											<textarea class="form-control" rows="10" th:field="*{dataHierarchy}"></textarea>
										</div>
									</div>

									<div class="form-group">
										<label class="control-label col-lg-3">Collection Metadata Validation Rules</label>
										<div class="col-lg-9">
											<textarea class="form-control" rows="10" th:field="*{collectionMetadataValidationRules}"></textarea>
										</div>
									</div>

									<div class="form-group">
										<label class="control-label col-lg-3">Data Object Metadata Validation Rules</label>
										<div class="col-lg-9">
											<textarea class="form-control" rows="10" th:field="*{dataObjectMetadataValidationRules}"></textarea>
										</div>
									</div>

									<div class="form-group">
										<div class="col-lg-offset-3 col-lg-9">
											<button type="submit" class="btn btn-primary">Submit</button>
											<a id="cancelBtn" class="btn btn-default" th:href="@{/doc/model(basePath=*{basePath})}">Cancel</a>
										</div>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</section>
			<div th:insert="~{footer :: footer}"></div>
		</section>
	</section>
	<script th:src="@{/js/jquery/3.1.1/jquery.min.js}"></script>
	<script th:src="@{/js/bootstrap/3.3.7/bootstrap.min.js}"></script>
	<script th:src="@{/js/scripts.js}"></script>
	<script>
		function prettyJson(id) {
			var el = document.getElementById(id);
			if (!el) return;
			try { el.value = JSON.stringify(JSON.parse(el.value), null, 4); } catch(e) {}
		}
		$(document).ready(function(){
			$('#sub-menu-admin').addClass("active");
			prettyJson('dataHierarchy');
			prettyJson('collectionMetadataValidationRules');
			prettyJson('dataObjectMetadataValidationRules');
		});
	</script>
</body>
</html>
