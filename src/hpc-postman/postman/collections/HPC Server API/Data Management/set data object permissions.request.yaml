$kind: http-request
name: Set Data Object Permissions
method: POST
url: '{{baseUrl}}{{basePath}}/dataObject/{{path}}/acl'
order: 16000
headers:
  - key: Content-Type
    value: 'application/json'
  - key: Accept
    value: 'application/json'
pathVariables:
  - key: path
    value: 'NCI/myCollection/myFile.txt'
body:
  type: json
  content: |-
    {
      "userPermissions": [{ "userId": "userId1", "permission": "READ" }],
      "groupPermissions": []
    }
