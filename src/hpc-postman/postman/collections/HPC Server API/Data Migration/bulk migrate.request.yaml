$kind: http-request
name: Bulk Migrate Data Objects or Collections
method: POST
url: '{{baseUrl}}{{basePath}}/migrate'
order: 3000
headers:
  - key: Content-Type
    value: 'application/json'
  - key: Accept
    value: 'application/json'
body:
  type: json
  content: |-
    {
      "dataObjectPaths": ["/NCI/myCollection/file1.txt"],
      "collectionPaths": [],
      "configurationId": "target-config-id"
    }
