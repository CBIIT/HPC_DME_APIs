$kind: http-request
name: Migrate Data Object
method: POST
url: '{{baseUrl}}{{basePath}}/dataObject/{{path}}/migrate'
order: 1000
headers:
  - key: Content-Type
    value: 'application/json'
  - key: Accept
    value: 'application/json'
pathVariables:
  - key: path
    value: 'NCI/myCollection/myFile.txt'
body:
  type: json
  content: |-
    {
      "configurationId": "target-config-id"
    }
