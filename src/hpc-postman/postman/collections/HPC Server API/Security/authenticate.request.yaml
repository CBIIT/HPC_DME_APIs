$kind: http-request
name: Authenticate
method: GET
url: "{{baseUrl}}{{basePath}}/authenticate"
body:
  type: json
  content: ""
auth:
  type: basic
  credentials:
    username: "{{vault:username}}"
    password: "{{vault:password}}"
order: 1000
headers:
  Accept: application/json
  Content-Type: application/json
