name: Copilot Agent Test Validation
permissions:
  contents: read

on:
  push:
    branches-ignore:
      - main
      - prod
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests on JDK 21
    runs-on:
      group: cbiit-global-runners
      labels: [self-hosted]
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v4.5
        with:
          maven-version: '3.9.4'

      - name: Execute Tests
        run: |
          cd $GITHUB_WORKSPACE/src
          mvn clean test
